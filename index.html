<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Slides HTML</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            margin-left: 10vw;
        }

        #esquerda {
            position: absolute;
            left: 0;
            top: 0;
            width: 10vw;
            height: 99vh;
            overflow: hidden;
            cursor: pointer;
        }

        #direita {
            position: absolute;
            right: 0;
            top: 0;
            width: 10vw;
            height: 99vh;
            overflow: hidden;
            cursor: pointer;
        }

        iframe {
            width: 90vw;
            height: 99vh;
            padding: 0;
            margin: 0;
        }
    </style>
</head>

<body>
    <!-- Área do slide -->
    <div id="esquerda" onclick="cliqueEsquerda()"> </div>
    <div id="direita" onclick="cliqueDireita()"> </div>
    <iframe id="frameSlide" src="src/perfil/novoperfil/pagina1.html"></iframe>

    <!-- Script -->
    <script>
        let intervalo;
        var pagina = 1;

        function cliqueEsquerda() {
             resetarIntervalo();
            if (pagina === 1) {
                pagina = 5;
            } else {
                pagina = pagina - 1;
            }
            trocarSlide(pagina);
        }

        function cliqueDireita() {
             resetarIntervalo();
            if (pagina === 5) {
                pagina = 1;
            } else {
                pagina = pagina + 1;
            }
            trocarSlide(pagina);
        }

        function iniciarIntervalo() {
            intervalo = setInterval(function () {
                pagina = pagina + 1;
                pagina = pagina === 6 ? 1 : pagina;

                trocarSlide(pagina);
            }, 10000);
        }

        function resetarIntervalo() {
            clearInterval(intervalo); // para o atual
            iniciarIntervalo();       // cria outro (reinicia)
        }

        // inicia ao carregar
        iniciarIntervalo();

        function trocarSlide(pagina) {
            const frame = document.getElementById("frameSlide");

            if (pagina === 1) {
                frame.src = "src/perfil/novoperfil/pagina1.html";
            } else if (pagina === 2) {
                frame.src = "src/perfil/novoperfil/pagina2.html";
            } else if (pagina === 3) {
                frame.src = "src/perfil/novoperfil/pagina3.html";
            } else if (pagina === 4) {
                frame.src = "src/perfil/novoperfil/pagina4.html";
            } else if (pagina === 5) {
                frame.src = "src/perfil/novoperfil/pagina5.html";
            }
        }
    </script>

</body>

</html>
